{% extends 'master/base.html' %}

{% block body %}
  <h1>Edit Task Information</h1>
  <form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label for="title" class="form-label">Title</label>
      <input type="text" name="title" value="{{ data.title }}" class="form-control" id="title" placeholder="Name of the task" />
    </div>
    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea name="description" class="form-control" id="description" rows="3">{{ data.description }}</textarea>
    </div>
    <div class="mb-3">
      <select name="priority" class="form-select" aria-label="Default select example">
        <option value="High" 
        {% if data.priority == 'High' %}
            selected
        {% endif %}
            >High</option>
        <option value="Medium" 
        {% if data.priority == 'Medium' %}
            selected
        {% endif %}
            >Medium</option>
        <option value="Low" 
        {% if data.priority == 'Low' %}
            selected
        {% endif %}
            >Low</option>
      </select>
    </div>
    <div class="mb-3">
      <select name="status" class="form-select" aria-label="Default select example">
        <option value="Pending" 
        {% if data.status == 'Pending' %}
            selected
        {% endif %}
            >Pending</option>
        <option value="In Progress" 
        {% if data.status == 'In Progress' %}
            
        {% endif %}
            >In Progress</option>
        <option value="Completed" 
        {% if data.status == 'Completed' %}
            selected
        {% endif %}
            >Completed</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="due_date" class="form-label">Due Date</label>
      <input type="date" name="due_date" value="{{ data.due_date|date:'Y-m-d' }}" class="form-control" id="due_date" />
    </div>
    <div class="mb-3">
      <label for="task_image" class="form-label">Task Image</label>
      <input type="file" name="task_image" class="form-control" id="task_image" />
      <img src="/{{ data.task_image }}" alt="" width="50px" height="50px" />
    </div>
    <button type="submit" class="btn btn-primary">Edit Task</button>
  </form>
{% endblock %}
